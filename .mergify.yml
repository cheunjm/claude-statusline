queue_rules:
  - name: default
    merge_method: squash
    update_method: rebase

pull_request_rules:
  - name: Keep branches up-to-date
    conditions:
      - base=main
      - "-conflict"
      - "-draft"
    actions:
      update: {}

  - name: Queue dependabot PRs
    conditions:
      - author~=^dependabot\[bot\]$
      - check-success=shellcheck
      - check-success=test
      - check-success=changeset
    actions:
      queue:
        name: default

  - name: Queue changeset release PRs
    conditions:
      - author=github-actions[bot]
      - head~=^changeset-release/
      - check-success=shellcheck
      - check-success=test
    actions:
      queue:
        name: default

  - name: Queue approved PRs
    conditions:
      - "#approved-reviews-by>=1"
      - check-success=shellcheck
      - check-success=test
      - check-success=changeset
    actions:
      queue:
        name: default
