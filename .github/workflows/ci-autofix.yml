name: CI Autofix

on:
  workflow_run:
    workflows: ["CI", "Auto-update PR branches"]
    types: [completed]

jobs:
  autofix:
    permissions:
      contents: write
      pull-requests: write
      issues: write
      actions: read
      id-token: write
    uses: aramiworks/.github/.github/workflows/ci-autofix.yml@main
    secrets: inherit
